version: 2

updates:
  # Daemon crate dependencies
  - package-ecosystem: cargo
    directory: /daemon
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(daemon):"
    groups:
      # Group minor and patch updates into a single PR to reduce noise
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Tauri crate dependencies
  - package-ecosystem: cargo
    directory: /frontend/src-tauri
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(tauri):"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(frontend):"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(actions):"
