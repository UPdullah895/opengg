name: Bug Report
description: Report a bug or unexpected behavior in OpenGG
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the details below to help us reproduce and fix the issue.

  - type: input
    id: opengg_version
    attributes:
      label: OpenGG Version
      description: Which version of OpenGG are you running? (e.g., v0.1.2)
      placeholder: "v0.1.2"
    validations:
      required: true

  - type: dropdown
    id: distro
    attributes:
      label: Linux Distribution
      description: Which Linux distribution are you using?
      options:
        - Arch / CachyOS
        - Fedora
        - Ubuntu / Debian
        - openSUSE
        - Other (please specify in description)
    validations:
      required: true

  - type: input
    id: distro_version
    attributes:
      label: Distribution Version
      description: What version of your distribution? (e.g., Ubuntu 24.04, Arch latest)
      placeholder: "Ubuntu 24.04"
    validations:
      required: false

  - type: dropdown
    id: display_server
    attributes:
      label: Display Server
      description: Are you using X11 or Wayland?
      options:
        - X11
        - Wayland
        - Unsure
    validations:
      required: true

  - type: input
    id: pipewire_version
    attributes:
      label: PipeWire Version
      description: Run `pactl --version` and paste the output
      placeholder: "pactl version 1.0.5"
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of OpenGG is affected?
      options:
        - Audio Mixer
        - Clips & Replay
        - Devices & RGB
        - Extensions
        - UI / Settings
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is. What did you expect to happen?
      placeholder: "When I try to route an application to the 'Chat' channel, the audio continues to play from all channels instead of just Chat."
    validations:
      required: true

  - type: textarea
    id: repro_steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Open OpenGG and go to the Mixer page
        2. Open a game/application
        3. Drag the application to the 'Chat' channel
        4. Expected: audio routes to Chat only; Actual: audio continues from all channels
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: "The application's audio should route to the Chat channel only."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: "The audio continues to play from Game, Chat, Media, and Aux simultaneously."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant logs. Check these locations:
        - Daemon log: `journalctl --user -u opengg`
        - Crash log: `~/.local/share/opengg/opengg_crash.log`
        - Frontend console: F12 in the app, Console tab
      placeholder: "Paste log output here..."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help us debug?
      placeholder: "I also tried resetting audio from Settings > Danger Zone, but the issue persists."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked that this issue is not a duplicate
          required: true
        - label: I have provided all relevant logs and system information
          required: false
