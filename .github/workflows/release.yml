name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release-linux:
    name: Build & Release (Linux)
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install system dependencies ──
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            jq

      # ── Rust toolchain ──
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache (daemon)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./daemon"

      - name: Rust cache (tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./frontend/src-tauri"

      # ── Node.js ──
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      # ── Build daemon ──
      - name: Build daemon (release)
        run: |
          cd daemon
          cargo build --release

      # ── Build frontend + Tauri bundles ──
      - name: Build Tauri bundles
        run: |
          cd frontend
          npm ci
          npx tauri build

      # ── Build custom AppImage ──
      - name: Build AppImage
        run: |
          chmod +x build-appimage.sh
          ./build-appimage.sh --skip-build

      # ── Sign AppImage ──
      - name: Sign AppImage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          cd frontend
          npx tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            ../OpenGG-*.AppImage

      # ── Generate latest.json ──
      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE="OpenGG-${VERSION}-x86_64.AppImage"
          SIG_FILE="${APPIMAGE}.sig"

          # Read signature content
          SIG_CONTENT=$(cat "$SIG_FILE" | tr -d '\n')

          # Build update manifest
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes on GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "${SIG_CONTENT}",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${APPIMAGE}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      # ── Create GitHub Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenGG ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            OpenGG-*.AppImage
            OpenGG-*.AppImage.sig
            latest.json
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/rpm/*.rpm
