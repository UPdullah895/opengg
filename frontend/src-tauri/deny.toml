[advisories]
version = 2
ignore = [
    # unic-ucd-version is unmaintained (RUSTSEC-2025-0098).
    # Pulled in transitively by tauri-utils → tauri v2.x; no fix available upstream.
    { id = "RUSTSEC-2025-0098" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# warp 0.3.7 → headers 0.3.9 pins base64 0.21.x; tauri uses 0.22.x.
# Cannot resolve without warp releasing a headers bump upstream.
[[bans.skip]]
name = "base64"
version = "=0.21.7"

[licenses]
default = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
