[advisories]
# Vulnerabilities and unsound advisories are always errors — no lint-level
# field exists for them in modern cargo-deny. We surface unmaintained crates
# and only warn on yanked so first adoption doesn't red-fail on a transitive.
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # -----------------------------------------------------------------------
    # All entries below are GTK3 / Tauri v2.x transitive dependencies.
    # None are reachable from OpenGG's own code. No upstream fixes exist;
    # tracked at https://github.com/tauri-apps/tauri.
    # -----------------------------------------------------------------------

    # gdkwayland-sys — tauri-runtime-wry → tao
    { id = "RUSTSEC-2024-0411" },
    # gdk — tauri → wry
    { id = "RUSTSEC-2024-0412" },
    # atk — tauri → tray-icon → libappindicator → gtk
    { id = "RUSTSEC-2024-0413" },
    # gdkx11-sys — tauri → wry
    { id = "RUSTSEC-2024-0414" },
    # gtk — tauri → tray-icon → libappindicator
    { id = "RUSTSEC-2024-0415" },
    # atk-sys — tauri → gtk
    { id = "RUSTSEC-2024-0416" },
    # gdkx11 — tauri → wry
    { id = "RUSTSEC-2024-0417" },
    # gdk-sys — tauri → webkit2gtk
    { id = "RUSTSEC-2024-0418" },
    # gtk3-macros — tauri → gtk
    { id = "RUSTSEC-2024-0419" },
    # gtk-sys — tauri → gtk
    { id = "RUSTSEC-2024-0420" },
    # rust-unic family (archived project, no fix) — tauri-utils → urlpattern → tauri v2.x
    { id = "RUSTSEC-2025-0075" },  # unic-char-range
    { id = "RUSTSEC-2025-0080" },  # unic-common
    { id = "RUSTSEC-2025-0081" },  # unic-char-property
    { id = "RUSTSEC-2025-0098" },  # unic-ucd-version
    { id = "RUSTSEC-2025-0100" },  # unic-ucd-ident
    # proc-macro-error (unmaintained) — tauri → gtk transitive
    { id = "RUSTSEC-2024-0370" },

    # quick-xml 0.39 — wayland-scanner (proc-macro) → wayland-client → ashpd →
    # rfd → tauri-plugin-dialog. wayland-scanner only parses the vendored,
    # trusted Wayland protocol XML bundled in wayland-protocols at build time
    # (codegen, not shipped in the binary), so the DoS/quadratic-parse issues
    # aren't reachable with attacker-controlled input. No fix available:
    # wayland-scanner's latest release (0.31.10) still pins quick-xml ^0.39.
    # Re-check when wayland-scanner bumps past that.
    { id = "RUSTSEC-2026-0194" },
    { id = "RUSTSEC-2026-0195" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# warp 0.3.7 → headers 0.3.9 pins base64 0.21.x; tauri uses 0.22.x.
# Cannot resolve without warp releasing a headers bump upstream.
[[bans.skip]]
name = "base64"
version = "=0.21.7"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
